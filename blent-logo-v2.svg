<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" width="320" height="90">
  <defs>
    <!-- Large bubble — purple glass -->
    <radialGradient id="v2-purp" cx="35%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#D4C8FF" stop-opacity="0.6"/>
      <stop offset="40%"  stop-color="#7B5EFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2D14A0" stop-opacity="0.5"/>
    </radialGradient>

    <!-- Small bubble — green glass -->
    <radialGradient id="v2-grn" cx="38%" cy="28%" r="60%">
      <stop offset="0%"   stop-color="#E8FFB0" stop-opacity="0.7"/>
      <stop offset="40%"  stop-color="#B8F05A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4A8000" stop-opacity="0.45"/>
    </radialGradient>

    <!-- Tiny bubble — lighter purple -->
    <radialGradient id="v2-tiny" cx="40%" cy="32%" r="60%">
      <stop offset="0%"   stop-color="#EDE8FF" stop-opacity="0.75"/>
      <stop offset="50%"  stop-color="#9B80FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5533CC" stop-opacity="0.5"/>
    </radialGradient>

    <!-- Specular highlight gradient -->
    <radialGradient id="v2-spec-p" cx="35%" cy="20%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="v2-spec-g" cx="38%" cy="22%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="v2-spec-t" cx="40%" cy="25%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="v2-shadow-p" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#4422CC" flood-opacity="0.25"/>
    </filter>
    <filter id="v2-shadow-g" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#4A8000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- === LARGE PURPLE BUBBLE (back-left) === -->
  <!-- Outer glow -->
  <circle cx="34" cy="48" r="30"
    fill="none" stroke="#7B5EFF" stroke-width="1" opacity="0.15"/>
  <!-- Body -->
  <circle cx="34" cy="48" r="28"
    fill="url(#v2-purp)"
    stroke="#C4B5FF" stroke-width="0.7" stroke-opacity="0.55"
    filter="url(#v2-shadow-p)"/>
  <!-- Specular -->
  <ellipse cx="25" cy="35" rx="13" ry="8" fill="url(#v2-spec-p)"/>
  <ellipse cx="22" cy="32" rx="4" ry="2.5" fill="white" opacity="0.7"/>
  <!-- Rim light -->
  <path d="M 55 56 A 28 28 0 0 1 22 70"
    fill="none" stroke="white" stroke-width="0.7"
    stroke-opacity="0.2" stroke-linecap="round"/>

  <!-- === SMALL GREEN BUBBLE (front-right, overlapping) === -->
  <!-- Outer glow -->
  <circle cx="62" cy="36" r="23"
    fill="none" stroke="#B8F05A" stroke-width="1" opacity="0.18"/>
  <!-- Body -->
  <circle cx="62" cy="36" r="21"
    fill="url(#v2-grn)"
    stroke="#D4FF88" stroke-width="0.7" stroke-opacity="0.6"
    filter="url(#v2-shadow-g)"/>
  <!-- Specular -->
  <ellipse cx="54" cy="25" rx="10" ry="6.5" fill="url(#v2-spec-g)"/>
  <ellipse cx="52" cy="23" rx="3" ry="2" fill="white" opacity="0.72"/>
  <!-- Rim light -->
  <path d="M 78 42 A 21 21 0 0 1 50 52"
    fill="none" stroke="white" stroke-width="0.7"
    stroke-opacity="0.22" stroke-linecap="round"/>

  <!-- === TINY PURPLE BUBBLE (bottom, nestled between) === -->
  <circle cx="50" cy="68" r="12"
    fill="url(#v2-tiny)"
    stroke="#C4B5FF" stroke-width="0.6" stroke-opacity="0.5"/>
  <ellipse cx="45" cy="62" rx="5.5" ry="3.5" fill="url(#v2-spec-t)"/>
  <ellipse cx="44" cy="61" rx="2" ry="1.3" fill="white" opacity="0.65"/>

  <!-- WORDMARK -->
  <text
    x="98" y="57"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="40"
    letter-spacing="-2"
    fill="#7B5EFF">blent</text>
</svg>
