<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 90" width="300" height="90">
  <defs>
    <!-- Main glass body gradient — purple tint -->
    <radialGradient id="v1-body" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#C4B5FF" stop-opacity="0.55"/>
      <stop offset="45%"  stop-color="#7B5EFF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#3A1FBB" stop-opacity="0.45"/>
    </radialGradient>

    <!-- Top specular flash -->
    <radialGradient id="v1-spec" cx="38%" cy="22%" r="45%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Bottom inner reflection -->
    <radialGradient id="v1-refl" cx="50%" cy="88%" r="45%">
      <stop offset="0%"   stop-color="#B8F05A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#B8F05A" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow -->
    <filter id="v1-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#5533CC" flood-opacity="0.28"/>
    </filter>

    <!-- Soft glow around bubble -->
    <filter id="v1-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="44" cy="44" r="36"
    fill="none"
    stroke="#7B5EFF"
    stroke-width="1"
    opacity="0.18"/>

  <!-- Glass bubble body -->
  <circle cx="44" cy="44" r="33"
    fill="url(#v1-body)"
    stroke="#C4B5FF"
    stroke-width="0.8"
    stroke-opacity="0.6"
    filter="url(#v1-shadow)"/>

  <!-- Bottom green reflection -->
  <circle cx="44" cy="44" r="33"
    fill="url(#v1-refl)"/>

  <!-- Top specular highlight -->
  <ellipse cx="35" cy="30" rx="16" ry="10"
    fill="url(#v1-spec)"/>

  <!-- Sharp small specular dot -->
  <ellipse cx="31" cy="26" rx="5" ry="3"
    fill="white" opacity="0.75"/>

  <!-- Thin rim light at bottom-right -->
  <path d="M 62 55 A 33 33 0 0 1 26 68"
    fill="none"
    stroke="white"
    stroke-width="0.8"
    stroke-opacity="0.22"
    stroke-linecap="round"/>

  <!-- WORDMARK -->
  <text
    x="92" y="57"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="40"
    letter-spacing="-2"
    fill="#7B5EFF">blent</text>
</svg>
